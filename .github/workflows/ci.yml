name: ci

on:
  pull_request:
    branches:
      - trunk

env:
  ZIG_VERSION: "0.14.0"

jobs:
  build:
    strategy:
      matrix:
        repo:
          - libjq
    runs-on: ubuntu-latest
    steps:
    - name: Setup Zig
      uses: mlugg/setup-zig@v1
      with:
        version: ${{ env.ZIG_VERSION }}

    - uses: actions/checkout@v4
      with:
        repository: "${{ github.repository_owner }}/${{ matrix.repo }}.zig"

    - name: Prepare ${{ matrix.repo }}.zig/build.zig.zon
      env:
        URL: "git+${{ github.server_url }}/${{ github.repository }}#${{ github.event.pull_request.head.sha }}"
      shell: 'bash'
      run: |
        zig fetch --save "${URL}"

    - name: Test updating ${{ matrix.repo }}.zig
      env:
        REPO: "${{ matrix.repo }}"
        RUNNER_TMP: "${{ runner.temp }}"
      shell: 'bash'
      run: |
        zig build -Dupdate

    - name: Test fetching ${{ matrix.repo }}.zig
      env:
        REPO: "${{ matrix.repo }}"
        RUNNER_TMP: "${{ runner.temp }}"
        PR_BODY: "${{ github.event.pull_request.body }}"
      shell: 'bash'
      run: |
        opts="$(printf '%s' "${PR_BODY}" | sed -n "s/^\[${REPO} fetch opts\] \(.*\)/\1/p")"
        opts="${opts#"${opts%%[![:space:]]*}"}"
        opts="${opts%"${opts##*[![:space:]]}"}"
        set -f
        zig build -Dfetch ${opts}
        set +f
